---
name: update-known-shas

on:
  workflow_dispatch: {}
  schedule:
    - cron: 0 6 * * 1

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve new action SHAs and update known-action-shas.properties
        id: update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          PROPS_FILE="src/main/resources/META-INF/rewrite/known-action-shas.properties"
          TAG_RE='^v[0-9]'
          SHA_RE='^[a-f0-9]{40}$'

          # ----------------------------------------------------------------
          # 1. Extract every "uses:" value from this repo's workflow files
          # ----------------------------------------------------------------
          mapfile -t USES_REFS < <(
            grep -rh 'uses:' .github/workflows/ \
              | sed 's/.*uses:[[:space:]]*//' \
              | tr -d '"'"'" \
              | sed 's/#.*//' \
              | tr -d '[:space:]' \
              | sort -u
          )

          ADDED_KEYS=()

          for ref in "${USES_REFS[@]}"; do
            # Skip blanks, local actions, docker refs
            [[ -z "$ref" ]] && continue
            [[ "$ref" == ./* ]] && continue
            [[ "$ref" == docker://* ]] && continue

            # Must match owner/repo@something or owner/repo/subpath@something
            if ! [[ "$ref" =~ ^([^/@]+/[^/@]+(/[^@]+)?)@(.+)$ ]]; then
              continue
            fi

            action_path="${BASH_REMATCH[1]}"
            tag="${BASH_REMATCH[3]}"

            # Skip already-pinned SHAs
            if [[ "$tag" =~ $SHA_RE ]]; then
              continue
            fi

            # Only include tags (e.g. v1, v2.3), skip branches
            if ! [[ "$tag" =~ $TAG_RE ]]; then
              echo "::notice::Skipping branch ref ${ref}"
              continue
            fi

            # Skip if already present in the properties file
            if grep -qF "${ref}=" "$PROPS_FILE" 2>/dev/null; then
              continue
            fi

            # Extract owner/repo (strip subpath)
            owner_repo="$action_path"
            if [[ "$action_path" =~ ^([^/]+/[^/]+)/.+ ]]; then
              owner_repo="${BASH_REMATCH[1]}"
            fi

            # Resolve tag → commit SHA via GitHub API
            sha=$(gh api "repos/${owner_repo}/commits/${tag}" \
                    --jq '.sha' 2>/dev/null || true)

            if [[ -z "$sha" ]] || ! [[ "$sha" =~ $SHA_RE ]]; then
              echo "::warning::Could not resolve ${ref} — skipping"
              continue
            fi

            echo "Resolved: ${ref} → ${sha}"
            echo "${ref}=${sha}" >> "$PROPS_FILE"
            ADDED_KEYS+=("${ref}=${sha}")
          done

          if [[ ${#ADDED_KEYS[@]} -eq 0 ]]; then
            echo "No new entries to add."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ----------------------------------------------------------------
          # 2. Sort the properties file (preserve header comments)
          # ----------------------------------------------------------------
          {
            grep '^#' "$PROPS_FILE" || true
            echo ""
            grep -v '^#' "$PROPS_FILE" | grep -v '^$' | sort
          } > /tmp/sorted.properties
          mv /tmp/sorted.properties "$PROPS_FILE"

          # ----------------------------------------------------------------
          # 3. Build PR body listing new entries
          # ----------------------------------------------------------------
          BODY="Adds the following new action SHA mappings (existing entries unchanged):"$'\n\n'
          for entry in "${ADDED_KEYS[@]}"; do
            key="${entry%%=*}"
            sha="${entry#*=}"
            BODY+="- \`${key}\` → \`${sha}\`"$'\n'
          done

          echo "changed=true" >> "$GITHUB_OUTPUT"
          # Pass multi-line body via env
          {
            echo "pr_body<<EOF_PR_BODY"
            echo "$BODY"
            echo "EOF_PR_BODY"
          } >> "$GITHUB_OUTPUT"

      - name: Open pull request
        if: steps.update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="automation/update-known-shas-$(date +%Y%m%d)"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add src/main/resources/META-INF/rewrite/known-action-shas.properties
          git commit -m "Update known action SHAs"
          git push origin "$BRANCH"

          gh pr create \
            --title "Update known action SHAs" \
            --body "${{ steps.update.outputs.pr_body }}" \
            --base main \
            --head "$BRANCH" \
            --label "dependencies" || true
