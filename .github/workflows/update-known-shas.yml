---
name: update-known-shas

on:
  workflow_dispatch: {}
  schedule:
    - cron: 0 6 * * 1

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve new action SHAs
        id: update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          .github/scripts/update-known-shas.sh

          PROPS_FILE="src/main/resources/META-INF/rewrite/known-action-shas.properties"
          if git diff --quiet "$PROPS_FILE"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"

            BODY="Adds the following new action SHA mappings (existing entries unchanged):"$'\n\n'
            while IFS= read -r line; do
              if [[ "$line" == +* && "$line" != +++* && "$line" == *=* ]]; then
                key="${line:1}"
                key="${key%%=*}"
                sha="${line#*=}"
                BODY+="- \`${key}\` → \`${sha}\`"$'\n'
              fi
            done < <(git diff "$PROPS_FILE")

            {
              echo "pr_body<<EOF_PR_BODY"
              echo "$BODY"
              echo "EOF_PR_BODY"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request
        if: steps.update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="automation/update-known-shas-$(date +%Y%m%d)"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add src/main/resources/META-INF/rewrite/known-action-shas.properties
          git commit -m "Update known action SHAs"
          git push origin "$BRANCH"

          gh pr create \
            --title "Update known action SHAs" \
            --body "${{ steps.update.outputs.pr_body }}" \
            --base main \
            --head "$BRANCH" \
            --label "dependencies" || true
